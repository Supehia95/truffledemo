<!DOCTYPE html>
<html>
<head>
  <title>My SDR Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
</head>
<body style="margin:0">
  <div class="desktopsize">
     Web Chat Setup 
    <div> <button onclick="doCallAgentforce()"> Start Chat</button> </div>
  </div>
  
</body>
</html>
<script type='text/javascript'>

function doCallAgentforce() {
           
    
    embeddedservice_bootstrap.utilAPI.launchChat();
}
	
	function pushPrechatFields() {
		try {
		  if (window.embeddedservice_bootstrap?.prechatAPI?.setHiddenPrechatFields) {
		  
			const preChatFields = {"url": window.location.href,"product_name":"Daxko Operations"}; // pass more params
			console.log("Prechat fields sent:", preChatFields);
			embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields(preChatFields);
		  }
		} catch (e) {
		  console.warn("Prechat push failed:", e);
		}
	}

	
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'
			embeddedservice_bootstrap.init(
				'00DKj00000UY7YZ',
				'TruffelDemo',
				'https://tr1755503902062.my.site.com/ESWTruffelDemo1759523968902',
				{
					scrt2URL: 'https://tr1755503902062.my.salesforce-scrt.com'
				}
			);

			window.addEventListener("onEmbeddedMessagingReady", () => {
           		pushPrechatFields();
       		});
			window.addEventListener('onEmbeddedMessagingConversationStarted', function (event) {
				console.log('Conversation started: ', event);
			});
			window.addEventListener('onEmbeddedMessageSent', function (event) {
				console.log('Conversation onEmbeddedMessageSent: ', event);
			});
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://tr1755503902062.my.site.com/ESWTruffelDemo1759523968902/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
	<style>
		.embeddedMessagingConversationButtonWrapper .embeddedMessagingConversationButton {
	    visibility: hidden;
	}

</style>
